name: Send Innovent Daily Report

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

jobs:
  send-report:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GMAIL_USER: ${{ secrets.GMAIL_USER }}
      GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
      REPORT_TO: ${{ secrets.REPORT_TO }}
      REPORT_TZ: Asia/Shanghai
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Send report
        run: npm run send:report
